schema_version: 1

project:
  name: glossapi-tokenizer-extension
  updated_at: 2026-04-14
  phase: repo_backed_near_dedup_and_source_upload_fallback
  objective: >
    Extend swiss-ai/Apertus-8B-2509 for Greek by learning genuinely useful Greek
    BPE units from curated Greek corpora. HPLT enters the workflow by being
    filtered, normalized into the canonical GlossAPI source-parquet schema,
    uploaded into the upstream HF dataset, and then consumed by the lightweight
    CPT/tokenizer builder. Discovery uses true BPE learning with Apertus-matched
    front-end tokenization behavior, then merges back only the selected new BPE
    units into Apertus through model.vocab and model.merges.

status:
  current_stage: gcp_worker_near_dedup_plus_temporary_source_only_upload
  shipping_method:
    target: merge_rule_bpe_extension
    not_allowed:
      - add_tokens_whole_word_extension
      - tokenizer_replacement_as_first_step
  previous_baseline:
    name: 2026-04-08_add_tokens_sweep
    kept_as: diagnostic_only
    use_cases:
      - fertility_sanity_check
      - evidence_that_greek_adaptation_is_worth_doing
      - negative_control_against_true_merge_extension
  execution_boundary:
    coordination_host: home
    coordination_host_must_not_run_worker_jobs: true
    tokenizer_worker_platform: gcp
    tokenizer_worker_lifecycle: minimal_instance_stop_when_done
  next_gate: freeze_worker_manifests_and_literal_apertus_replication_checklist

dataset_integration:
  upstream_hf_dataset:
    repo_id: fffoivos/glossapi-greek-nanochat-pretraining-dataset
    stage: broad_canonical_source_parquets
    path_glob: data/*.parquet
    published_source_parquets_are_undeduplicated: true
  downstream_builder:
    role: lightweight_subset_mix_split_and_chunk_builder
    must_not_redefine_cleaning_or_dedup_policy: true
  canonical_source_parquet_schema:
    columns:
      - source_dataset
      - source_doc_id
      - text
      - title
      - author
      - source_metadata_json
      - is_historical_or_polytonic
      - contains_math
      - contains_latex
      - greek_percentage
      - latin_percentage
      - polytonic_ratio
      - table_ratio
      - greek_badness_score
      - mojibake_badness_score
      - needs_ocr
      - is_empty
      - filter
      - ocr_success
      - quality_method
      - reevaluated_at
  hplt_mapping_defaults:
    title: null_when_not_credibly_available
    author: null_when_not_credibly_available
    hplt_specific_provenance_goes_to_source_metadata_json: true
  operational_release_path:
    use_existing_dataset_scripts_only: true
    intended_scripts:
      - /home/foivos/Projects/glossapi-tokenizer-extension/assemble_hf_release.py
      - /home/foivos/Projects/glossapi-tokenizer-extension/prepare_publish_release.py
      - /home/foivos/Projects/glossapi-tokenizer-extension/publish_hf_release.py
  uploader_track:
    separate_from_tokenizer_worker: true
    instance_profile: cheap_single_purpose_uploader
    lifecycle: create_or_start_for_upload_then_stop
    must_not_block_tokenizer_critical_path: true
    temporary_exception:
      allowed_when_cheap_uploader_unreachable: true
      mode: low_priority_source_only_upload_from_active_gcp_worker
    staged_payload:
      - complete_filtered_hplt_source_parquets
      - refreshed_dedup_metadata_bundle
    upload_method:
      script: /home/foivos/Projects/glossapi-tokenizer-extension/publish_hf_release.py
      huggingface_api_path: HfApi.upload_large_folder
      prefer_xet_backend_when_available: true
      optional_high_performance_env:
        - HF_XET_HIGH_PERFORMANCE=1
      high_performance_mode_requires:
        - high_bandwidth_path
        - at_least_64gb_ram
      note: use_official_large_folder_upload_path_for_large_dataset_publication

apertus_compatibility:
  tokenizer_family: BPE
  tokenizer_backend: HuggingFace_fast_tokenizer
  tokenizer_artifact_format: huggingface_tokenizer_directory
  tokenizer_files_required:
    - tokenizer.json
    - tokenizer_config.json
    - special_tokens_map.json
  base_vocab_size: 131072
  final_vocab_multiple: 128
  ids:
    bos_token_id: 1
    eos_token_id: 2
    pad_token_id: 3
    reserved_front_block_size: 1000
    reserved_front_block_end_id: 999
    placeholder_special_id_range:
      start: 73
      end: 999
  tokenizer_config:
    add_bos_token: true
    add_eos_token: false
    add_prefix_space: false
    normalizer: null
  special_tokens_behavior:
    lstrip: false
    rstrip: false
    normalized: false
    single_word: false
  pretokenizer:
    type: Sequence
    split_regex_source: apertus_tekken_regex
    byte_level:
      add_prefix_space: false
      trim_offsets: true
      use_regex: false
  decoder:
    type: ByteLevel
    add_prefix_space: true
    trim_offsets: true
    use_regex: true
  bpe_model:
    ignore_merges: true
    dropout: null
    unk_token: null
    continuing_subword_prefix: null
    end_of_word_suffix: null
    fuse_unk: false
    byte_fallback: false
  extension_constraints:
    do_not_change_first_1000_ids: true
    do_not_change_special_token_behavior: true
    do_not_change_regex_or_byte_level_regime: true
    preserve_exact_front_end_behavior_during_discovery: true
    extend_through_model_vocab_and_model_merges: true
    do_not_ship_added_tokens_path: true
  model_resize:
    tie_word_embeddings: false
    resize_embed_tokens: true
    resize_lm_head: true

corpus:
  training_views:
    - glossapi_only
    - glossapi_plus_hplt
  mixed_view_policy:
    glossapi_share: 70
    hplt_share: 30
    unit: training_token_mass
    apply_after_filtering: true
  nanochat:
    role: primary_downstream_aligned_greek_corpus
    source: upstream_hf_dataset_builder_output
    train_split: nanochat_train
    holdout_splits:
      - nanochat_eval
  hplt:
    role: representative_open_web_greek_supplement
    integration_target: upstream_hf_canonical_source_parquets
    target_size_policy: roughly_match_nanochat_scale_for_first_round
    quality_filter:
      status: provisional_default
      keep_bins:
        - 8
        - 9
        - 10
      note: bins_below_8_currently_look_not_worth_keeping
    corpus_clean_filter:
      required: true
      tool: glossapi_corpus_clean
      drop_when_greek_badness_score_gt: 60
    content_filter:
      status: decided
      exclude_main_register_codes:
        - MT
      exclude_main_register_labels:
        - Machine translated or generated
      note: exclude_mt_from_final_training_dataset_even_if_other_quality_signals_pass
    upload_mapping:
      top_level_fields_from_hplt:
        - source_dataset
        - source_doc_id
        - text
        - title
        - author
      source_metadata_json_fields:
        - url
        - host
        - content_type
        - crawl_id
        - quality_bin
        - filter
        - lang
        - prob
        - cluster_size
        - register_level_1
        - register_level_2
        - raw_web_register_optional
    stratify_by:
      - source_host
      - content_type_when_available
      - web_register_level_1
      - web_register_level_2_canonical
      - length_bin
      - crawl_id
    shard_sampling:
      allow_contiguous_prefix_sampling: false
      method: randomized_or_reservoir_across_shard_positions
    source_overlap_controls:
      exclude_same_source_overlap_with_nanochat_when_feasible: true
      compare_mirrored_collections_when_feasible: true
  openarchives:
    keep_rule:
      require_needs_ocr_false: true
      note: do_not_reintroduce_openarchives_rows_marked_needs_ocr_true_into_tokenizer_or_cpt_inputs
  deduplication:
    handled_by_upstream_dataset_pipeline: true
    tokenizer_project_scope:
      - consume_the_resulting_cleaned_and_deduplicated_dataset
      - do_not_reimplement_dedup_as_a_separate_local_builder_stage
    note: corpus_must_still_be_deduplicated_but_that_work_is_owned_by_the_upstream_dataset_pipeline

execution:
  parallel_tracks:
    tokenizer_critical_path:
      - freeze_worker_training_manifests
      - verify_openarchives_needs_ocr_exclusion
      - freeze_eval_manifests
      - lock_literal_apertus_replication_checklist
      - export_bpe_training_text
      - run_discovery_bpe_training
      - diff_new_units_against_apertus
      - run_cutoff_sweep
      - implement_merge_rule_extension
    dataset_operational_sidetrack:
      - rebuild_and_upload_corrected_hplt_slice_on_gcp
      - rerun_prepared_source_dataset_with_hplt_included
      - refresh_published_dedup_metadata_later
      - stage_release_on_separate_cheap_uploader_instance
      - publish_release_with_official_hf_large_folder_upload
  upload_blocking_policy:
    hf_upload_must_not_block_local_tokenizer_progress: true
    dedup_metadata_refresh_must_not_block_local_tokenizer_progress: true

tokenizer_experiments:
  discovery_tokenizer:
    vocab_size: 50000
    purpose: overgenerate_candidate_bpe_units_before_merge_back_selection
    learning_mode: true_bpe_training
    forbid_surface_form_frequency_additions: true
    must_match_apertus_front_end_behavior: true
  merge_back:
    selection_happens_after_discovery: true
    may_drop_short_or_low_value_units_before_apertus_merge: true
    final_new_token_count_expected_to_be_much_less_than_50000: true

review:
  manual_training_sample_review:
    sample_size: 200
    source: filtered_or_frozen_hplt_upload_candidate_pool
    stratify_by:
      - corpus_source
      - source_family
      - length_bin
      - modern_monotonic_vs_polytonic_or_historical
    checks:
      - greek_language_validity
      - domain_balance
      - ocr_noise
      - boilerplate_or_junk
      - polytonic_load
    outputs:
      - review_sample.jsonl
      - txt_bundle
      - reviewer_notes
  audit_samples:
    may_include_excluded_classes_for_filter_validation: true
    note: machine_translated_or_generated_can_still_appear_in_review_or_audit_samples

evaluation:
  heldout_sets:
    - nanochat_eval
    - hplt_eval
    - modern_greek_eval
  fertility_tests:
    run_on: apertus_compatible_merged_variants
    not_on: raw_discovery_tokenizer_alone
    cutoff_targets:
      - 5000
      - 10000
      - 15000
      - 20000
    final_whole_tokenizer_vocab_must_be_divisible_by: 128
  optional_sets:
    - polytonic_stress_eval
  constraints:
    training_and_evaluation_documents_must_not_overlap: true
  primary_decision_set: modern_greek_eval

bpe_discovery:
  training_method: true_greek_bpe_training
  training_data_source: same_cpt_ready_dataset_used_for_apertus_continued_pretraining
  must_match_apertus_pretokenization: true
  working_vocab_target: 50000
  training_variants:
    - glossapi_only
    - glossapi_plus_hplt
  candidate_selection:
    reject_single_document_artifacts: true
    require_cross_source_or_cross_domain_support: true
    downweight:
      - polytonic_only_units
      - boilerplate_fragments
      - markup_artifacts
      - source_specific_noise

extension_selection:
  analytic_cutoff_sweep:
    requested_new_token_counts:
      - 10240
      - 15360
      - 20480
      - 25600
  shipped_build:
    align_final_new_token_count_to_multiple_of: 128
    pick_smallest_size_that_captures_most_greek_gain: true
  tokenizer_variant_decision:
    compare:
      - glossapi_only
      - glossapi_plus_hplt
    default_preference: glossapi_only
