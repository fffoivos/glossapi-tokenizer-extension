# Script-level bit assignments (level 1 of the v3 hierarchy).
#
# Stable wire identifiers: a script's `bit` is never reused, even if
# the script is retired from active research scope. New scripts append
# at the next free bit.
#
# `iso15924` is the canonical Unicode script code (Latn, Cyrl, …).
# Two encodings of Greek share `iso15924: Grek` but get distinct bits
# (Grek-modern and Grek-polyton) so the modern / polytonic split is
# legible at the script layer too.
#
# 29 entries (as of v3.3) → fits in binary(16) (uniform width across the three
# bitmask levels for consumer simplicity).

version: 1
scripts:
  - bit: 0
    code: Latn
    iso15924: Latn
    name: Latin
  - bit: 1
    code: Cyrl
    iso15924: Cyrl
    name: Cyrillic
  - bit: 2
    code: Grek-modern
    iso15924: Grek
    name: Greek (modern encoding)
  - bit: 3
    code: Grek-polyton
    iso15924: Grek
    name: Greek (polytonic encoding)
  - bit: 4
    code: Arab
    iso15924: Arab
    name: Arabic
  - bit: 5
    code: Hans
    iso15924: Hans
    iso15924_aliases: [Hani]
    name: Han (Simplified)
    note: Hani is FineWeb-2's generic Han-script tag; consumers should default Hani → Hans (Simplified is the larger CJK corpus by volume); switch to Hant only if the sample is identified as Traditional.
  - bit: 6
    code: Hant
    iso15924: Hant
    name: Han (Traditional)
  - bit: 7
    code: Jpan
    iso15924: Jpan
    iso15924_aliases: [Hira, Kana, Hrkt]
    name: Japanese (Han + Kana)
    note: Hira / Kana / Hrkt are the syllable-set tags that map to Japanese when paired with `jpn`. Generic Hani in a `jpn_*` key also resolves here.
  - bit: 8
    code: Hang
    iso15924: Hang
    name: Hangul
  - bit: 9
    code: Deva
    iso15924: Deva
    name: Devanagari
  - bit: 10
    code: Hebr
    iso15924: Hebr
    name: Hebrew
  - bit: 11
    code: Thai
    iso15924: Thai
    name: Thai
  - bit: 12
    code: Armn
    iso15924: Armn
    name: Armenian
  - bit: 13
    code: Geor
    iso15924: Geor
    name: Georgian
  - bit: 14
    code: Beng
    iso15924: Beng
    name: Bengali
  - bit: 15
    code: Taml
    iso15924: Taml
    name: Tamil
  - bit: 16
    code: Telu
    iso15924: Telu
    name: Telugu
  - bit: 17
    code: Knda
    iso15924: Knda
    name: Kannada
  - bit: 18
    code: Mlym
    iso15924: Mlym
    name: Malayalam
  - bit: 19
    code: Gujr
    iso15924: Gujr
    name: Gujarati
  - bit: 20
    code: Guru
    iso15924: Guru
    name: Gurmukhi
  - bit: 21
    code: Mymr
    iso15924: Mymr
    name: Myanmar

  # --- v3.3 additions (new scripts) ---
  - bit: 22
    code: Ethi
    iso15924: Ethi
    name: Ethiopic
  - bit: 23
    code: Khmr
    iso15924: Khmr
    name: Khmer
  - bit: 24
    code: Sinh
    iso15924: Sinh
    name: Sinhala
  - bit: 25
    code: Laoo
    iso15924: Laoo
    name: Lao
  - bit: 26
    code: Tibt
    iso15924: Tibt
    name: Tibetan
  - bit: 27
    code: Orya
    iso15924: Orya
    name: Odia (Oriya)
  - bit: 28
    code: Thaa
    iso15924: Thaa
    name: Thaana
