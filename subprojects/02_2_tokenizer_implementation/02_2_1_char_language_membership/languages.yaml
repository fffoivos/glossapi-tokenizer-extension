# Source of truth for (language, script, encoding) → bit assignment.
#
# Each row defines one (language, script, encoding) triple. The `code`
# is conversational shorthand; the wire-format identifier is `bit`.
# `script` (ISO 15924) and `cldr_locale` together pin the encoding —
# e.g. `el` vs `el-polyton`, `sr-Latn` vs `sr-Cyrl`, `zh-Hans` vs
# `zh-Hant` are different encodings of overlapping languages.
#
# # Scope assumption
#
# The Apertus-8B-2509 tokenizer was *not* retrained on Apertus's
# pretrain data — Apertus inherited Mistral-Nemo-Base-2407's `tekken`
# tokenizer wholesale (paper §2.2, verified in
# `docs/APERTUS_ARCHITECTURE_FOR_EMBEDDING_NORM_ANALYSIS.md`).
# Mistral-Nemo's tokenizer was trained on "over 100 languages" but
# Mistral has NOT published the actual list — only 11 principal
# languages are publicly named (en, fr, de, es, it, pt, zh, ja, ko,
# ar, hi).
#
# Since we cannot enumerate Mistral's actual coverage from primary
# sources, we use **Apertus's documented pretrain mix as a proxy**:
# the languages Apertus subsequently saw (and therefore the languages
# whose tokens got reinforced) are the languages this artifact aims
# to discriminate. The proxy stands on two assumptions:
#   1. Mistral-Nemo and Apertus draw from the same family of
#      CommonCrawl-derived multilingual web corpora (FineWeb-2-style).
#   2. Languages absent from Apertus's mix are also absent or
#      negligible in Mistral's — i.e. there's no major language
#      Mistral covered that Apertus deliberately excluded.
# Both assumptions are defensible but not provable. The validation
# audit in `scripts/validate.py` checks the FALSIFIABLE part: every
# script that appears with non-trivial token presence in the actual
# Apertus vocab is covered by a bit in this file.
#
# # Strict rule (rejection framing)
#
# A bit is set on a codepoint ONLY via positive CLDR evidence (plus
# deterministic closures: case, NFD, in-script-range fallback for
# letters). Never speculative. A letter in a script that has no bit
# here gets 0 bits, which under AND-aggregation rejects every
# in-scope language — that's the desired behaviour.
#
# # Rules
#
#   - `bit` is a stable wire-format identifier. Never reassign.
#   - To add a triple, append at the next free bit; never reuse.
#   - `cldr_locale` is the BCP 47 string passed to cldr-json paths.
#   - `script` is the ISO 15924 script code. Used by the script-range
#     fallback in the build to assign bits to in-script codepoints
#     missing from CLDR's curated exemplar.

